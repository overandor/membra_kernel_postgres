services:
  - type: web
    name: membra-kernel
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: membra-db
          property: connectionString
      - key: MEMBRA_DATA_ENCRYPTION_KEY
        generateValue: true
      - key: ACCESS_SIGNING_SECRET
        generateValue: true
      - key: AUTO_CREATE_TABLES
        value: "true"

databases:
  - name: membra-db
    databaseName: membra
    user: membra_user
    plan: free
